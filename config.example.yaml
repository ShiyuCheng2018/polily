# config.example.yaml

api:
  request_timeout_seconds: 20
  # user_agent: HTTP User-Agent header sent to Polymarket APIs.
  # Omit this key (or leave it unset) to use the built-in default
  # `polily/<current-version>`, which stays in sync with the installed
  # package version automatically. Only set it if you need a custom label.
  # user_agent: ""

scoring:
  # Per-dimension weights live in code, not YAML — see
  # polily/scan/scoring.py (_TYPE_WEIGHTS / _DEFAULT_WEIGHTS).

  thresholds:
    tier_a_min_score: 70
    tier_b_min_score: 45
    # Tier A mode: set false so Tier A is score-only (always has content)
    # Set true to require mispricing signal (stricter, may be empty most days)
    tier_a_require_mispricing: false

# AI Agent configuration
# All agents use Claude Code CLI (claude -p), included in subscription — no API key, no per-token cost.
ai:
  narrative_writer:                      # Decision advisor — the only AI agent
    model: "sonnet"                      # needs synthesis, web search, generation quality
    timeout_seconds: 300                 # 5 min — agent does web searches, needs time
    # max_prompt_chars: 5000             # truncation threshold for tool-mode prompts (Phase 0 Task 13)

# Mispricing detection configuration
mispricing:
  enabled: true
  # Crypto threshold markets: compare market price vs. volatility-implied probability
  # Price source is Binance via ccxt (no API key, 6000/min); implied vol uses Deribit when available.
  crypto:
    volatility_lookback_days: 30
    min_deviation_pct: 0.08           # was 0.05 — must exceed round-trip friction (4-6%) to be real edge
  # Multi-outcome consistency check
  multi_outcome:
    enabled: true
    max_sum_deviation: 0.10           # flag if outcome YES prices sum deviates >10% from 1.0

# Database
archiving:
  db_file: "./data/polily.db"

# Wallet (v0.6.0 paper trading system)
wallet:
  starting_balance: 100.0              # initial cash when wallet is first created or reset

movement:
  magnitude_threshold: 70
  quality_threshold: 60
  daily_analysis_limit: 10
  # min_history_entries: 5             # min movement_log rows before scoring kicks in (Phase 0 Task 12)
  # stale_threshold_seconds: 600       # data older than this skipped, in seconds (Phase 0 Task 12)

# TUI configuration (Phase 0 Task 14)
# tui:
#   heartbeat_seconds: 5.0             # interval for bus_heartbeat refresh tick
