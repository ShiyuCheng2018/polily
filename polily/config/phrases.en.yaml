overall:
  total_judgment:
    - range: [0, 10]
      phrases: ["This market is rotten — don't even touch it", "Structure is fully broken, pure waste of time", "Garbage market, next"]
    - range: [10, 20]
      phrases: ["Fundamentals are a mess — don't be the sucker", "Whatever you do here you're donating", "Cut your losses and move on"]
    - range: [20, 30]
      phrases: ["Market structure is weak, nothing to play here", "Skip unless you have a super-strong signal", "Conditions too poor to risk it"]
    - range: [30, 40]
      phrases: ["Market structure is mediocre, not a good target", "Passable but don't expect much", "Why do this when better opportunities exist"]
    - range: [40, 50]
      phrases: ["Below-average structure, makeshift with weak spots", "Lukewarm — chicken ribs", "If picking carefully, skip this one"]
    - range: [50, 55]
      phrases: ["Market structure barely passes", "Just clears the trading bar", "Conditions are mediocre"]
    - range: [55, 60]
      phrases: ["Market structure is OK", "Worth considering", "Conditions basically met"]
    - range: [60, 65]
      phrases: ["Market structure is good", "Worth a serious look", "Conditions are fairly ideal"]
    - range: [65, 70]
      phrases: ["Market structure is solid", "Worth spending time on", "Most conditions are in place"]
    - range: [70, 75]
      phrases: ["Market structure is very good", "Worth tracking closely", "Most conditions are dialed in"]
    - range: [75, 80]
      phrases: ["Market structure is excellent", "Top-priority candidate", "Conditions are quite good"]
    - range: [80, 85]
      phrases: ["Market structure is outstanding", "A rare good market", "Looks great across the board"]
    - range: [85, 90]
      phrases: ["Market structure is exceptional", "Opportunities like this are uncommon", "Hard to find a flaw"]
    - range: [90, 95]
      phrases: ["Textbook market structure", "Top-tier trading opportunity", "Rarely see ones this good"]
    - range: [95, 100]
      phrases: ["Perfect market structure", "One in a thousand", "All conditions max out"]

  strongest:
    - "Bright spot is {dim}: {phrase}"
    - "Biggest advantage is {dim} — {phrase}"
    - "{dim} stands out: {phrase}"

  weakest:
    - "Weak spot is {dim}: {phrase}"
    - "Biggest risk is in {dim} — {phrase}"
    - "Watch out for {dim}: {phrase}"

  advice:
    # === Edge + Liquidity (crypto core scenario) ===
    - condition: {net_edge_pct_gte: 70, liquidity_pct_gte: 70}
      phrases: ["Big edge + deep book — textbook setup, build with limit orders", "Strong model signal + sufficient liquidity, execute with discipline", "Opportunities like this are rare, follow the plan"]
    - condition: {net_edge_pct_gte: 50, liquidity_pct_lt: 30}
      phrases: ["Edge exists but liquidity is too thin — paper profit only", "Model says opportunity but book is thin, try a small limit order", "Edge looks tempting but you can't get out"]
    - condition: {net_edge_pct_gte: 50, liquidity_pct_gte: 30, liquidity_pct_lt: 50}
      phrases: ["Edge is decent but liquidity mediocre, light position with patient limit orders", "Model has signal but book isn't deep enough, control size", "Opportunity exists but be patient on entry/exit"]
    - condition: {net_edge_pct_gte: 50, liquidity_pct_gte: 50}
      phrases: ["Edge + liquidity both met, build position with limit orders by the book", "Model found clear deviation and book is deep — execute the plan", "Quant signal clear, liquidity adequate"]

    # === Edge + Friction ===
    - condition: {net_edge_pct_gte: 40, friction_pct_lt: 20}
      phrases: ["Has edge but friction eats all the profit, not worth it", "Model sees opportunity but spread too wide, wait for better quotes", "Edge in theory but real entry/exit costs are too high"]
    - condition: {net_edge_pct_gte: 30, friction_pct_gte: 60}
      phrases: ["Edge + low friction — good cost-benefit", "Deviation has meat after friction, worth doing", "Model signal + low cost, conditions are good"]

    # === Edge + Time ===
    - condition: {net_edge_pct_gte: 40, time_pct_lt: 15}
      phrases: ["Model sees edge but settlement too far, watchlist for now", "Deviation present but time cost high, wait until closer", "Edge here but capital efficiency too low, just track"]
    - condition: {net_edge_pct_gte: 40, time_pct_gte: 60}
      phrases: ["Edge + good time window, catalyst incoming, get ready", "Model signal + time aligned, can act", "Clear deviation and settlement near, don't miss it"]

    # === Friction extreme ===
    - condition: {friction_pct_lt: 10}
      phrases: ["Friction is absurdly high — entering means losing", "Spread too wide to trade, don't touch", "Market makers are killing it here, don't be the sucker"]
    - condition: {friction_pct_lt: 25, net_edge_pct_lt: 40}
      phrases: ["Friction too high, edge can't cover it, wait for tighter spread", "Round-trip friction eats most of profit room, observe only", "MMs make more than you, wait for better quotes"]
    - condition: {friction_pct_gte: 80, liquidity_pct_gte: 60}
      phrases: ["Low friction + good liquidity, trading conditions are great", "Entry/exit costs negligible and book is deep, trade away", "Spread barely exists, can act anytime"]

    # === Verifiability related ===
    - condition: {verifiability_pct_lt: 15, total_gte: 50}
      phrases: ["Other conditions OK but settlement too vague, watch for disputes", "Data side is fine but settlement rules unreliable, control size", "Structure is OK but settlement risky, don't all-in"]
    - condition: {verifiability_pct_lt: 25}
      phrases: ["Settlement basis is unclear, high dispute risk", "Rules too vague, win or lose is debatable", "With this settlement standard, even winning may not pay"]
    - condition: {verifiability_pct_gte: 80, total_gte: 60}
      phrases: ["Settlement is rock-solid, other conditions good too, trade with confidence", "High result certainty + good structure, just focus on direction", "Verifiability maxed, no need to worry about disputes"]

    # === Time alone and crosses ===
    - condition: {time_pct_gte: 80, liquidity_pct_gte: 50, probability_pct_gte: 40}
      phrases: ["Time + liquidity + probability triple-aligned, get in now", "Golden window with everything in place, don't hesitate", "Catalyst imminent and book is deep, this is the moment"]
    - condition: {time_pct_gte: 60, liquidity_pct_lt: 30}
      phrases: ["Deadline near but liquidity too thin, post limit orders and wait", "Time window good but book thin, can post and wait for catalyst", "Settlement near but trading is hard"]
    - condition: {time_pct_lt: 10}
      phrases: ["Settlement too far, entering now just locks capital", "Too early, better places for funds", "Watch for now, revisit when within 30-day window"]
    - condition: {time_pct_lt: 20, total_gte: 50}
      phrases: ["Other conditions OK but too early, add to watchlist for the time window", "Structure is fine but time too distant, track without rushing in", "Good market but not ripe yet, revisit when closer"]
    - condition: {time_pct_lt: 20, total_lt: 50}
      phrases: ["Time far + structure poor, nothing to see", "Too early and conditions bad, skip", "Wait for better opportunities"]

    # === Probability alone and crosses ===
    - condition: {probability_pct_lt: 10}
      phrases: ["Price already extreme, no room left", "Lopsided market, skip unless you have insider info", "Odds are unwatchable"]
    - condition: {probability_pct_lt: 20, liquidity_pct_gte: 50}
      phrases: ["Price extreme but book deep, contrarian play if you have a strong signal", "Bad odds but good liquidity, suits contrarian thinkers", "Most won't touch but if you have edge consider it"]
    - condition: {probability_pct_lt: 20}
      phrases: ["Price too extreme, odds are bad", "Near-final verdict, little point entering", "Odds too poor — even right you barely earn"]
    - condition: {probability_pct_gte: 70, friction_pct_gte: 60}
      phrases: ["Good odds + low friction, high cost-benefit ratio", "Big probability space and low cost, good setup", "Price still tug-of-war and cost low, can participate"]
    - condition: {probability_pct_gte: 70, time_pct_gte: 50}
      phrases: ["Good odds + suitable time, conditions are good", "Big probability space and good window, worth a serious look", "No verdict yet and catalyst near"]

    # === Liquidity extreme ===
    - condition: {liquidity_pct_lt: 10}
      phrases: ["Liquidity is essentially zero, price without market", "Can't trade this book, just look", "Can't buy what you want, can't sell what you have"]
    - condition: {liquidity_pct_lt: 20, total_gte: 50}
      phrases: ["Everything except liquidity is OK, wait for book to improve", "Structure OK but book too thin, not currently tradeable", "Conditions decent but missing liquidity — watchlist for now"]
    - condition: {liquidity_pct_gte: 80, friction_pct_gte: 70}
      phrases: ["Deep book + low friction, top-tier trading conditions", "Buy as much as you want at extremely low cost", "Market makers competing well, retail benefits"]

    # === Non-crypto high-score scenarios ===
    - condition: {total_gte: 70, net_edge_pct_lt: 5, is_crypto: false}
      phrases: ["Market structure is good but no quant edge — judge direction yourself", "Structure is fine, what's missing is direction call, see AI analysis before deciding", "Hardware is good but software isn't, combine news + analysis to call direction"]
    - condition: {total_gte: 60, is_crypto: false, time_pct_gte: 50}
      phrases: ["Non-crypto market structure OK + time aligned, study the fundamentals", "Structure score decent, key is your event judgment", "Market conditions in place, do the research before picking direction"]

    # === Total score bands ===
    - condition: {total_lt: 25}
      phrases: ["Structure is too poor, don't waste your bullets here", "This market isn't worth your time", "Find better opportunities"]
    - condition: {total_gte: 25, total_lt: 40}
      phrases: ["Structure is weak, skip unless you have a unique angle", "Conditions aren't great, risk-reward is bad", "Not impossible but better choices exist"]
    - condition: {total_gte: 40, total_lt: 55}
      phrases: ["Conditions are mediocre, small position only if you must", "Structure is so-so, don't put much in", "Borderline — depends on your risk appetite"]
    - condition: {total_gte: 55, total_lt: 65}
      phrases: ["Decent overall but nothing standout, light testing position works", "Average opportunity suits light participation", "Conditions pass — strictly control position size"]
    - condition: {total_gte: 65, total_lt: 75}
      phrases: ["Conditions are decent, worth taking seriously", "Solid structure, can size up moderately", "Balanced across dimensions, good target"]
    - condition: {total_gte: 75, total_lt: 85}
      phrases: ["Conditions are very good, execute by the book — limit orders and controlled size", "Rare good opportunity — limit orders for entry, set stops", "All scores are high, take it seriously but still control risk"]
    - condition: {total_gte: 85}
      phrases: ["Top-tier setup, fully research this opportunity", "Rare set of conditions, worth your time and capital", "Every indicator green, execute the plan"]

    # === Multi-dimensional weakness ===
    - condition: {liquidity_pct_lt: 30, friction_pct_lt: 30}
      phrases: ["Bad liquidity + high friction, double-trouble, don't touch", "Can't get in or out and it's expensive, triple whammy", "Thin book and wide spread — even MMs don't want to make this"]
    - condition: {liquidity_pct_lt: 30, time_pct_lt: 20}
      phrases: ["Bad liquidity + far time, double disadvantage", "Thin book and a long wait, terrible capital efficiency", "Wait for liquidity to improve and time to get closer"]
    - condition: {probability_pct_lt: 25, friction_pct_lt: 30}
      phrases: ["Bad odds + high friction, doing it is futile", "No room and it's expensive — what's the point", "Small probability space + high cost — math says no"]

    # === Fallback ===
    - condition: {total_gte: 0}
      phrases: ["See the AI analysis before deciding", "Average conditions, caution wins", "Do your research before acting"]
