  strongest:
    - "亮点在{dim}: {phrase}"
    - "最大优势是{dim} — {phrase}"
    - "{dim}表现突出: {phrase}"

  weakest:
    - "短板是{dim}: {phrase}"
    - "最大风险在{dim} — {phrase}"
    - "注意{dim}: {phrase}"

  advice:
    # === Edge + Liquidity 交叉 (crypto核心场景) ===
    - condition: {net_edge_pct_gte: 70, liquidity_pct_gte: 70}
      phrases: ["Edge大+盘口深，教科书级setup，限价建仓", "模型强信号+流动性充足，严格执行", "这种机会不多，按纪律打"]
