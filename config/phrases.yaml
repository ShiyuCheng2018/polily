      phrases: ["有edge但流动性太差，纸面利润而已", "模型说有机会但盘口太薄，小仓位限价单试试", "Edge看着诱人但你出不来"]
    - condition: {net_edge_pct_gte: 50, liquidity_pct_gte: 30, liquidity_pct_lt: 50}
      phrases: ["Edge不错但流动性一般，轻仓限价慢慢挂", "模型有信号但盘口不够厚，控制好仓位", "有机会但进出要耐心"]
    - condition: {net_edge_pct_gte: 50, liquidity_pct_gte: 50}
      phrases: ["Edge+流动性双达标，按纪律限价建仓", "模型发现明确偏差且盘口深，可以按计划执行", "量化信号明确，流动性也够"]

    # === Edge + Friction 交叉 ===
    - condition: {net_edge_pct_gte: 40, friction_pct_lt: 20}
      phrases: ["有edge但摩擦把利润全吃了，不划算", "模型看到机会但价差太宽，等报价改善", "理论上有edge但实际进出成本太高"]
    - condition: {net_edge_pct_gte: 30, friction_pct_gte: 60}
      phrases: ["edge+低摩擦，性价比不错", "偏差扣完摩擦还有肉，值得做", "模型信号+低成本，条件不错"]

    # === Edge + Time 交叉 ===
    - condition: {net_edge_pct_gte: 40, time_pct_lt: 15}
      phrases: ["模型看到edge但离结算太远，先watchlist跟着", "有偏差但时间成本高，等更近再考虑", "edge在但资金效率太低，先盯着"]
